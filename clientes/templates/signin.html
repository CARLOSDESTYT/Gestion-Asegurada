{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }
    .toggle-password {
        position: absolute;
        right: 15px;
        cursor: pointer;
        color: #666;
        z-index: 10;
    }
    .campo_signup input {
        padding-right: 45px;
        width: 100%;
    }
</style>

<div class="container_signup"> 
    <div class="card">
        <div class="card_title">
            <h1>Iniciar Sesión</h1>
            <span>¿Aún no tienes cuenta? <a href="{% url 'signup' %}">Regístrate</a></span>
        </div>
        
        <div class="form_signup">
            {% if error %}
                <p style="color: red; text-align: center; font-size: 1.2rem; margin-bottom: 15px;">{{ error }}</p>
            {% endif %}

            <form method="POST" action="{% url 'signin' %}">
                {% csrf_token %}
                
                <div class="campo_signup" style="margin-bottom: 20px;">
                    <div style="text-align: left; margin-bottom: 2px; font-weight: bold; color: #333;">
                        Nombre de usuario
                    </div>
                    <input type="text" name="username" id="username" placeholder="Nombre de Usuario" required />
                </div>
                
                <div class="campo_signup" style="margin-bottom: 20px;">
                    <div style="text-align: left; margin-bottom: 2px; font-weight: bold; color: #333;">
                        Contraseña
                    </div>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" placeholder="Contraseña" required />
                        <i class="fa-solid fa-eye toggle-password" onclick="toggleVisibility('password', this)"></i>
                    </div>
                </div>
                
                <button type="submit" class="boton_signup">Entrar</button>
            </form>
        </div>

        <div class="card_terms" style="justify-content: center; margin-top: 15px;">
            <span><a href="#">¿Olvidaste tu contraseña?</a></span>
        </div>
    </div>
</div>

<script>
    function toggleVisibility(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>
{% endblock %}
